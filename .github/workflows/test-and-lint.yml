name: Run Python tests

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "Australia/Melbourne"
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install package
        run: uv sync --group ci --extra casadi --extra jax
      - name: Build runtime wheel
        run: uv run maturin build --manifest-path coker_runtime/crates/coker-python/Cargo.toml -o target/wheels
      - name: Extract runtime wheel
        run: |
          uv run python -c "import pathlib, shutil, zipfile; output = pathlib.Path('target/wheel_extract'); shutil.rmtree(output, ignore_errors=True); wheel = max(pathlib.Path('target/wheels').glob('coker-*.whl')); zipfile.ZipFile(wheel).extractall(output)"
      - name: Run default test suite
        run: uv run pytest -m "not perf" -o pythonpath=target/wheel_extract

  perf:
    name: Run perf tests
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install package
        run: uv sync --group ci --extra casadi --extra jax
      - name: Run perf suite
        run: uv run pytest -m perf

  rust-runtime:
    name: Rust workspace checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cargo test --workspace
        working-directory: coker_runtime
      - name: Check no_std runtime
        run: cargo check -p coker-runtime --no-default-features
        working-directory: coker_runtime

  linter-name:
    name: runner / black and flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install package
        run: uv sync --group ci --extra casadi --extra jax
      - name: Run black
        run: uv run black --check --diff src
      - name: Run flake8
        run: uv run flake8 src tests docs examples scripts