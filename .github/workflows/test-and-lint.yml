name: Run Python tests

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "Australia/Melbourne"
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install package
        run: uv sync --group ci --extra casadi --extra jax
      - name: Run tests
        run: uv run pytest

  linter-name:
    name: runner / black and flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install package
        run: uv sync --group ci --extra casadi --extra jax
      - name: Run black
        run: uv run black --check --diff src
      - name: Run flake8
        run: uv run flake8 src tests docs examples scripts